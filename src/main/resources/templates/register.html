<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5 col-md-4">
    <h2 class="text-center">Register</h2>

    <form th:action="@{/register}" method="post" th:object="${user}">
        <input type="text" th:field="*{name}" class="form-control mb-3" placeholder="Name" required>
        <input type="email" th:field="*{email}" class="form-control mb-3" placeholder="Email" required>
        <input type="password" th:field="*{password}" class="form-control mb-3" placeholder="Password" required>

        <select th:field="*{role}" class="form-control mb-3">
            <option value="ADMIN">ADMIN</option>
            <option value="MEMBER">MEMBER</option>
        </select>

        <button class="btn btn-success w-100">Register</button>
    </form>

    <p class="mt-3 text-center">
        Already registered? <a href="/login">Login</a>
    </p>
</div>
</body>
</html>
