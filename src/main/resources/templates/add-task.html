<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5 col-md-5">

    <h2>Add Task</h2>

    <form th:action="@{/tasks/add}" method="post" th:object="${task}">

        <input type="text" th:field="*{title}" class="form-control mb-3" placeholder="Task Title" required>

        <textarea th:field="*{description}" class="form-control mb-3" placeholder="Task Description"></textarea>

        <select th:field="*{status}" class="form-control mb-3">
            <option value="PENDING">PENDING</option>
            <option value="IN_PROGRESS">IN_PROGRESS</option>
            <option value="COMPLETED">COMPLETED</option>
        </select>

        <input type="date" th:field="*{dueDate}" class="form-control mb-3" required>

        <select th:field="*{project}" class="form-control mb-3">
            <option th:each="project : ${projects}"
                    th:value="${project.id}"
                    th:text="${project.projectName}">
            </option>
        </select>

        <select th:field="*{assignedUser}" class="form-control mb-3">
            <option th:each="user : ${users}"
                    th:value="${user.id}"
                    th:text="${user.name}">
            </option>
        </select>

        <button class="btn btn-success">Save Task</button>

    </form>
</div>
</body>
</html>
